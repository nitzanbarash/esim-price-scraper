name: eSIM price scrape

# Runs daily in GitHub's cloud — your Mac does NOT need to be on.
on:
  # Triggered externally by cron-job.org for precise 10:00 Israel time.
  # Manual trigger from GitHub Actions tab also works.
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium + system deps
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          # The service-account JSON is stored as a repo secret, never in the code.
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python esim_price_scraper.py
