name: eSIM price scrape

# Runs daily in GitHub's cloud — your Mac does NOT need to be on.
on:
  # Automatic daily run — no external service or Mac required.
  # GitHub's free scheduler can drift by up to a few hours, but it always runs
  # at least once a day. For exact 10:00 timing, an external trigger
  # (cron-job.org) can POST to workflow_dispatch instead.
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 10:00 Israel (summer) / 09:00 (winter)
  # Manual trigger (Actions tab) + external triggers (cron-job.org).
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium + system deps
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          # The service-account JSON is stored as a repo secret, never in the code.
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python esim_price_scraper.py
